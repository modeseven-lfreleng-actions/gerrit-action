version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI(actions)"
    # Wait before opening a bump PR so we don't churn on a release
    # that gets retracted or superseded shortly after it ships.
    # This is required to satisfy the zizmor workflow auditing tool.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15

  # Root project dependencies are managed with uv (pyproject.toml +
  # uv.lock); the uv ecosystem tracks the dev/test toolchain.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Chore"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15

  # The extended Gerrit Docker image installs a separate set of
  # hash-pinned runtime dependencies (gerrit-to-platform, requests)
  # from docker/requirements*.txt, which are pip-managed rather than
  # part of the root uv lockfile.
  - package-ecosystem: "pip"
    directory: "/docker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "Chore"
    open-pull-requests-limit: 5
