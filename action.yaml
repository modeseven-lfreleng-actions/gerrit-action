---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# gerrit-server-action
name: "⚙️ Gerrit Server Container"
description: |
  Starts Gerrit server(s) with pull-replication plugin for
  mirroring production Gerrit instances

inputs:
  # Mandatory
  gerrit_setup:
    description: |
      JSON array defining Gerrit instances to start.
      Format: [{"slug": "onap", "gerrit": "gerrit.onap.org", "project": "", "api_path": "/r"}]

      Fields:
        - slug (required): Short identifier for the instance
        - gerrit (required): Gerrit server hostname
        - project (optional): Project filter for replication
            - Empty string or omitted: Replicate ALL projects from server
            - Literal name: "releng/lftools" - single project
            - Comma-separated: "releng/lftools,ci-management" - multiple projects
            - Regex pattern: "regex:releng/.*" or "regex:^infra/.*" - pattern matching
        - api_path (optional): API path prefix (e.g., "/infra", "/r", "/gerrit")

      Can be overridden by repository variable GERRIT_SETUP
    required: true

  # Authentication (one method required)
  ssh_private_key:
    description: "SSH private key for Gerrit sync authentication"
    required: false
  ssh_known_hosts:
    description: |
      SSH known_hosts entries for Gerrit servers
      (auto-generated if not provided)
    required: false
  http_username:
    description: |
      HTTP basic auth username
      (required if auth_type=http_basic)
    required: false
  http_password:
    description: |
      HTTP basic auth password
      (required if auth_type=http_basic)
    required: false
  bearer_token:
    description: |
      Bearer token for HTTP authentication
      (required if auth_type=bearer_token)
    required: false

  # Optional - Gerrit Configuration
  gerrit_version:
    description: "Gerrit Docker image version tag"
    required: false
    default: '3.13.1-ubuntu24'
  plugin_version:
    description: "Pull-replication plugin version/branch"
    required: false
    default: 'stable-3.13'
  base_http_port:
    description: "Starting HTTP port (increments for multi-instance)"
    required: false
    default: '8080'
  base_ssh_port:
    description: "Starting SSH port (increments for multi-instance)"
    required: false
    default: '29418'
  auth_type:
    description: "Authentication method: ssh, http_basic, or bearer_token"
    required: false
    default: 'ssh'
  remote_ssh_user:
    description: |
      SSH username for authenticating to remote Gerrit servers.
      This is the account on the REMOTE Gerrit server that has the
      ssh_private_key's corresponding public key registered.
      Can be overridden per-instance in gerrit_setup with 'ssh_user'.
    required: false
    default: 'gerrit'
  remote_ssh_port:
    description: |
      SSH port for remote Gerrit servers (typically 29418).
      Can be overridden per-instance in gerrit_setup with 'ssh_port'.
    required: false
    default: '29418'

  # Optional - Replication Settings
  sync_on_startup:
    description: "Trigger replication after startup"
    required: false
    default: 'true'
  fetch_every:
    description: |
      Interval for pull-replication polling (e.g., '60s', '5m').
      The pull-replication plugin will poll the source Gerrit at this
      interval to fetch any new or changed refs. This enables automatic
      replication while keeping the web UI fully functional.
      Set to '0s' to disable automatic polling.
    required: false
    default: '60s'
  replication_timeout:
    description: "Timeout for initial replication sync (in seconds)"
    required: false
    default: '600'
  sync_refs:
    description: "Refs to synchronize (default: all branches, tags, changes)"
    required: false
    default: '+refs/heads/*:refs/heads/*,+refs/tags/*:refs/tags/*,+refs/changes/*:refs/changes/*'
  replication_threads:
    description: "Number of replication threads per instance"
    required: false
    default: '4'
  max_projects:
    description: |
      Maximum number of projects to fetch from remote Gerrit when no
      project filter is specified. Limits API queries for large instances.
      Set to a higher value if you need to replicate more projects.
    required: false
    default: '800'
  skip_archived_projects:
    description: |
      Skip archived (``READ_ONLY``) and hidden projects when fetching
      the project list from the source Gerrit.  When ``'true'`` (the
      default) the action passes ``?state=ACTIVE`` to the source
      Gerrit's ``/projects/`` REST endpoint so archived projects are
      filtered out server-side and never get pre-created locally;
      pull-replication consequently does not mirror them, which can
      roughly halve initial sync time on instances that carry a large
      historical archive (ONAP is 181 active + 214 read_only = 395
      total).  Set to ``'false'`` to mirror archived projects too —
      necessary when debugging or backfilling a specific archived
      repository.
    required: false
    default: 'true'
  replicate_meta_refs:
    description: |
      Mirror Gerrit NoteDb meta refs in addition to the normal heads /
      tags / changes refs.  Required for the deployed CI Gerrit to
      render *open changes* (votes, comments, status), per-account
      identities and group memberships from the source server.

      Concretely, when ``'true'`` the generated ``replication.config``
      gains:

        * ``+refs/meta/*:refs/meta/*`` and
          ``+refs/cache-automerge/*:refs/cache-automerge/*`` on every
          per-project remote (per-project ACLs + merge-preview cache).
        * A second ``[remote "<slug>-meta"]`` section targeted at
          ``All-Users`` and ``All-Projects`` that pulls a curated set
          of enumerated NoteDb refs:

            - ``refs/users/*``, ``refs/groups/*`` (account &
              group definitions)
            - ``refs/meta/external-ids`` (login → account_id map)
            - ``refs/meta/group-names`` (group UUID → name)
            - ``refs/meta/version`` (NoteDb schema pin)
            - ``refs/sequences/*`` (change-number sequence)
            - ``refs/draft-comments/*``, ``refs/starred-changes/*``
              (per-user state)

      ``refs/meta/config`` is INTENTIONALLY EXCLUDED from the
      magic-repo remote.  Pulling the source server's
      ``All-Projects:refs/meta/config`` would overwrite the deployed
      container's locally-bootstrapped global ACL and silently
      strip ``administrate-server`` from the bootstrap admin
      account, breaking the reindex / cache-flush REST calls and
      the admin UI on the deployed Gerrit.  See the block comment
      in ``scripts/start-instances.py::generate_replication_config``
      for the full rationale.

      Off by default because it materially increases initial sync
      size on instances with large review histories.  Combine with
      ``reindex_after_sync: 'true'`` so the Gerrit Lucene index
      reflects the replicated NoteDb state in the UI.
    required: false
    default: 'false'
  reindex_after_sync:
    description: |
      After the initial pull-replication sync completes, run an
      online reindex (and cache flush) inside each Gerrit container.
      Required for replicated changes to actually show up in the UI
      and search results, because Gerrit's dashboard queries hit the
      Lucene secondary index, not NoteDb directly.

      The reindex iterates over every replicated project and issues
      ``POST /a/projects/<name>/index.changes``, then flushes the
      ``accounts``, ``groups`` and ``external_ids_map`` caches via
      ``POST /a/config/server/caches/`` so newly replicated account /
      group refs become visible without a container restart.

      Has no effect when ``sync_on_startup`` is ``'false'``.  Off by
      default; typically enabled together with ``replicate_meta_refs``.
    required: false
    default: 'false'
  require_replication_success:
    description: |
      If true and sync_on_startup is true, the workflow will fail
      if replication verification fails. Set to false to allow
      the workflow to succeed even if replication issues are detected.
    required: false
    default: 'true'
  replication_wait_timeout:
    description: |
      Maximum time (in seconds) to wait for replication to complete.
      Replication is considered complete when the repository count
      matches the expected count from the remote Gerrit server.
      Increase this value for large Gerrit instances.
      Only used when sync_on_startup is true.
    required: false
    default: '600'

  # Optional - Container Management
  exit:
    description: "Stop containers when the job completes"
    required: false
    default: 'true'
  check_service:
    description: "Verify service availability after startup"
    required: false
    default: 'true'
  enable_cache:
    description: "Enable Docker layer and dependency caching"
    required: false
    default: 'true'
  cache_key_suffix:
    description: "Extra suffix for cache keys"
    required: false
    default: ''

  # Optional - Advanced
  debug:
    description: "Enables debugging output"
    required: false
    default: 'false'
  use_api_path:
    description: |
      When true, the local Gerrit container will use the same URL context
      path as the source/origin server (e.g., /r, /infra). This ensures
      that clone URLs and static content paths match the production server.
      When false, the container serves at root (/).
    required: false
    default: 'false'
  additional_plugins:
    description: "Comma-separated list of extra plugin URLs to install"
    required: false
  gerrit_init_args:
    description: "Extra arguments for gerrit.war init"
    required: false
  skip_plugin_install:
    description: "Skip pull-replication plugin installation (testing)"
    required: false
    default: 'false'
  ssh_auth_keys:
    description: |
      SSH public keys to add for accessing the Gerrit container.
      One key per line, in standard authorized_keys format.

      When ssh_auth_username is also provided, a new Gerrit user
      account will be created with that username and these keys.
      Otherwise, keys are added to the default admin account.

      Example:
        ssh_auth_keys: |
          ssh-ed25519 AAAAC3... user@example.com
          ecdsa-sha2-nistp256 AAAAE2... another@example.com
    required: false
    default: ''
  ssh_auth_username:
    description: |
      Gerrit username to create for SSH access.
      When provided along with ssh_auth_keys, a new Gerrit user
      account will be created with this username and the provided
      SSH public keys.

      If not provided, ssh_auth_keys will be added to the default
      admin account (ID 1000000).

      Example:
        ssh_auth_username: 'myusername'
    required: false
    default: ''
  tunnel_host:
    description: |
      External tunnel hostname for public access.
      Examples: 'bore.pub', Tailscale IP (e.g., '100.x.y.z').

      When set along with tunnel_ports, Gerrit will be configured with
      external URLs for canonicalWebUrl and sshd.advertisedAddress.

      The tunnel should be started before invoking this action, pointing
      to the local ports (base_http_port, base_ssh_port).
    required: false
    default: ''
  tunnel_ports:
    description: |
      JSON object mapping instance slugs to their tunnel port assignments.
      Required when tunnel_host is set. Format:
        {"slug": {"http": 12345, "ssh": 54321}, ...}

      For single-instance setups, use the slug from gerrit_setup.
      The ports are the remote/public ports assigned by the tunnel service.

      Example:
        tunnel_ports: '{"lf-gerrit": {"http": 45678, "ssh": 45679}}'
    required: false
    default: ''

  # G2P (gerrit_to_platform) integration
  g2p_enable:
    description: |
      Enable Gerrit to Platform (g2p) integration.
      When true, configures the gerrit_to_platform plugin
      inside the Gerrit container to dispatch GitHub Actions
      workflows in response to Gerrit events.
    required: false
    default: 'false'
  g2p_github_token:
    description: |
      GitHub Personal Access Token (Fine-Grained) for the
      target organisation. Required permissions: Actions
      (read/write), Contents (read), Metadata (read).
    required: false
    default: ''
  g2p_github_owner:
    description: |
      GitHub organisation or user that owns the target
      repositories. Required when g2p_enable is true.
    required: false
    default: ''
  g2p_remote_name_style:
    description: |
      How Gerrit project names map to GitHub repository
      names in the replication config.
      Options: dash, underscore, slash
    required: false
    default: 'dash'
  g2p_remote_url:
    description: |
      Override the GitHub remote URL pattern. Uses ${name}
      as the repository name placeholder. Auto-generated
      from g2p_github_owner when not provided.
    required: false
    default: ''
  g2p_remote_auth_group:
    description: |
      Gerrit authGroup for the GitHub replication remote.
      Must contain "github" for g2p platform detection.
    required: false
    default: 'GitHub Replication'
  g2p_comment_mappings:
    description: |
      JSON object mapping comment keywords to workflow
      search filters for the comment-added hook.
    required: false
    default: >-
      {"recheck": "verify", "reverify": "verify",
       "remerge": "merge"}
  g2p_hooks:
    description: |
      Comma-separated list of Gerrit hooks to enable for
      g2p. Available: patchset-created, comment-added,
      change-merged
    required: false
    default: 'patchset-created,comment-added,change-merged'
  g2p_validation_mode:
    description: |
      Controls behaviour when GitHub-side checks fail.
      Options: error, warn, skip
    required: false
    default: 'warn'
  g2p_validate_workflows:
    description: |
      When true, checks that the target GitHub org has
      properly configured Gerrit workflows.
    required: false
    default: 'true'
  g2p_validate_repos:
    description: |
      Comma-separated list of GitHub repositories to
      check for Gerrit workflow configuration.
    required: false
    default: ''
  g2p_ssh_private_key:
    description: |
      SSH private key for GitHub push-based replication.
      When not provided, a keypair is auto-generated.
    required: false
    default: ''
  g2p_github_known_hosts:
    description: |
      SSH known hosts entries for github.com.
      Auto-fetched via ssh-keyscan when not provided.
    required: false
    default: ''
  g2p_org_setup:
    description: |
      Controls GitHub org verification and auto-provisioning.
      Options:
        provision - Audit AND always-overwrite required org
                    secrets and variables on every run, even
                    when they already exist.  Overwrite is
                    deliberate because each container build
                    produces a fresh ephemeral SSH key and may
                    bind to different tunnel host / ports
                    between runs; leaving stale values on the
                    GitHub side would silently break downstream
                    workflows.  Use `g2p_org_token_map` to
                    supply an elevated token per org.
        verify   - Audit and report only (default).  No writes
                    to the GitHub org.
        skip     - Do not audit org configuration.
    required: false
    default: 'verify'
  g2p_org_token_map:
    description: |
      Base64-encoded JSON array mapping GitHub org names
      to PATs for org-level provisioning. Recommended when
      g2p_org_setup is 'provision' so each target org can
      use a dedicated admin:org-scoped token; otherwise
      g2p_github_token is used as a fallback.

      JSON schema (pre-encoding):
        [
          {"github_org": "my-org",     "token": "ghp_xxx..."},
          {"github_org": "other-org",  "token": "ghp_yyy..."}
        ]

      Encoding (whitespace is tolerated; single line or
      wrapped both work):
        printf '%s' "$JSON" | base64

      Store the resulting string as a repo/org secret
      (e.g. G2P_ORG_TOKENS) and pass it via this input.

      See docs/GITHUB-ORG-VERIFY-CONFIG.md for details.
    required: false
    default: ''

outputs:
  container_ids:
    description: "JSON array of running container IDs"
    value: ${{ steps.collect-outputs.outputs.container_ids }}
  container_ips:
    description: "JSON array of container IP addresses"
    value: ${{ steps.collect-outputs.outputs.container_ips }}
  instances:
    description: |
      JSON object mapping slug to instance details
      {cid, ip, http_port, ssh_port, url, api_path, api_url}
    value: ${{ steps.collect-outputs.outputs.instances }}
  gerrit_urls:
    description: "Comma-separated list of Gerrit HTTP URLs"
    value: ${{ steps.collect-outputs.outputs.gerrit_urls }}
  api_paths:
    description: |
      JSON object mapping slug to API path details
      {gerrit_host, api_path, api_url} for each instance.
      The api_path is the URL prefix (e.g., /r, /infra, /gerrit)
      detected or provided for each Gerrit server.
    value: ${{ steps.collect-outputs.outputs.api_paths }}
  ssh_host_keys:
    description: |
      JSON object mapping slug to SSH host public keys.
      Contains the auto-generated SSH host keys for each Gerrit instance,
      which can be used by downstream steps for automation tasks.
      Format: {slug: {ssh_host_rsa_key: "...", ssh_host_ed25519_key: "...", ...}}
    value: ${{ steps.collect-outputs.outputs.ssh_host_keys }}
  g2p_enabled:
    description: "Whether G2P integration ran"
    value: ${{ steps.configure-g2p.outputs.g2p_enabled || steps.g2p-defaults.outputs.g2p_enabled }}
  g2p_config_path:
    description: "Path to generated INI inside container"
    value: ${{ steps.configure-g2p.outputs.g2p_config_path || steps.g2p-defaults.outputs.g2p_config_path }}
  g2p_hooks_enabled:
    description: "JSON array of hooks that got symlinks"
    value: ${{ steps.configure-g2p.outputs.g2p_hooks_enabled || steps.g2p-defaults.outputs.g2p_hooks_enabled }}
  g2p_github_owner:
    description: "Configured GitHub owner"
    value: ${{ steps.configure-g2p.outputs.g2p_github_owner || steps.g2p-defaults.outputs.g2p_github_owner }}
  g2p_remote_name_style:
    description: "Configured repository name style"
    value: ${{ steps.configure-g2p.outputs.g2p_remote_name_style || steps.g2p-defaults.outputs.g2p_remote_name_style }}
  g2p_validation_results:
    description: "JSON array of GitHub check results"
    value: ${{ steps.configure-g2p.outputs.g2p_validation_results || steps.g2p-defaults.outputs.g2p_validation_results }}
  g2p_token_provided:
    description: "Whether a GitHub token was supplied"
    value: ${{ steps.configure-g2p.outputs.g2p_token_provided || steps.g2p-defaults.outputs.g2p_token_provided }}
  g2p_ssh_public_key:
    description: "Public key for downstream deploy-key setup"
    value: ${{ steps.configure-g2p.outputs.g2p_ssh_public_key || steps.g2p-defaults.outputs.g2p_ssh_public_key }}
  g2p_org_audit_results:
    description: >-
      JSON array of org-level audit check results.
    value: >-
      ${{ steps.configure-g2p.outputs.g2p_org_audit_results
         || steps.g2p-defaults.outputs.g2p_org_audit_results }}
  g2p_org_provisioned:
    description: >-
      Whether any org items were auto-provisioned.
    value: >-
      ${{ steps.configure-g2p.outputs.g2p_org_provisioned
         || steps.g2p-defaults.outputs.g2p_org_provisioned }}

runs:
  using: "composite"
  steps:
    - name: 'Setup action/environment'
      id: setup
      shell: bash
      env:
        INPUT_GERRIT_SETUP: ${{ inputs.gerrit_setup }}
        INPUT_AUTH_TYPE: ${{ inputs.auth_type }}
        INPUT_SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        INPUT_HTTP_USERNAME: ${{ inputs.http_username }}
        INPUT_HTTP_PASSWORD: ${{ inputs.http_password }}
        INPUT_BEARER_TOKEN: ${{ inputs.bearer_token }}
        INPUT_BASE_HTTP_PORT: ${{ inputs.base_http_port }}
        INPUT_BASE_SSH_PORT: ${{ inputs.base_ssh_port }}
        INPUT_FETCH_EVERY: ${{ inputs.fetch_every }}
        INPUT_GERRIT_VERSION: ${{ inputs.gerrit_version }}
        INPUT_PLUGIN_VERSION: ${{ inputs.plugin_version }}
        INPUT_SYNC_ON_STARTUP: ${{ inputs.sync_on_startup }}
        INPUT_ENABLE_CACHE: ${{ inputs.enable_cache }}
      # The only $GITHUB_ENV writes below are WORK_DIR and
      # INSTANCE_COUNT. WORK_DIR is a PID-based /tmp path (consumed by
      # later steps) and is not user-controllable. INSTANCE_COUNT is
      # the numeric output of 'jq length' over gerrit_setup: although
      # it derives from an input it can only ever be an integer, so it
      # cannot inject additional environment entries. The github-env
      # audit is intentionally suppressed for this step.
      run: | # zizmor: ignore[github-env]
        # Setup Gerrit server action environment and validate configuration
        set -euo pipefail

        echo "# Gerrit Server Action ⚙️" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        # Validate required inputs
        if [ -z "$INPUT_GERRIT_SETUP" ]; then
          echo "::error::gerrit_setup is a mandatory input ❌"
          exit 1
        fi

        # Validate JSON format
        if ! printf '%s' "$INPUT_GERRIT_SETUP" | jq empty 2>/dev/null; then
          echo "::error::gerrit_setup is not valid JSON ❌"
          exit 1
        fi

        # Validate authentication
        AUTH_TYPE="$INPUT_AUTH_TYPE"
        case "$AUTH_TYPE" in
          ssh)
            if [ -z "$INPUT_SSH_PRIVATE_KEY" ]; then
              echo "::error::ssh_private_key required when auth_type=ssh ❌"
              exit 1
            fi
            ;;
          http_basic)
            if [ -z "$INPUT_HTTP_USERNAME" ] || \
               [ -z "$INPUT_HTTP_PASSWORD" ]; then
              echo "::error::http_username and http_password required when auth_type=http_basic ❌"
              exit 1
            fi
            ;;
          bearer_token)
            if [ -z "$INPUT_BEARER_TOKEN" ]; then
              echo "::error::bearer_token required when auth_type=bearer_token ❌"
              exit 1
            fi
            ;;
          *)
            echo "::error::Invalid auth_type: $AUTH_TYPE ❌"
            exit 1
            ;;
        esac

        # Validate port numbers
        if ! [[ "$INPUT_BASE_HTTP_PORT" =~ ^[0-9]+$ ]]; then
          echo "::error::base_http_port must be a valid number ❌"
          exit 1
        fi
        if ! [[ "$INPUT_BASE_SSH_PORT" =~ ^[0-9]+$ ]]; then
          echo "::error::base_ssh_port must be a valid number ❌"
          exit 1
        fi

        # Validate fetch_every format
        FETCH_EVERY="$INPUT_FETCH_EVERY"
        if ! [[ "$FETCH_EVERY" =~ ^[0-9]+[smhSMH]?$ ]]; then
          echo "::error::fetch_every must be a valid interval (e.g., '60s', '5m', '1h', or '0' to disable) ❌"
          exit 1
        fi

        # Create working directory
        WORK_DIR="/tmp/gerrit-action-$$"
        mkdir -p "$WORK_DIR"
        echo "WORK_DIR=$WORK_DIR" >> "$GITHUB_ENV"
        echo "Working directory: $WORK_DIR" >> "$GITHUB_STEP_SUMMARY"

        # Display configuration
        echo "**Configuration** ⚙️" >> "$GITHUB_STEP_SUMMARY"
        echo "- Gerrit version: \`$INPUT_GERRIT_VERSION\`" \
          >> "$GITHUB_STEP_SUMMARY"
        echo "- Plugin version: \`$INPUT_PLUGIN_VERSION\`" \
          >> "$GITHUB_STEP_SUMMARY"
        echo "- Auth type: \`$INPUT_AUTH_TYPE\`" \
          >> "$GITHUB_STEP_SUMMARY"
        echo "- Sync on startup: \`$INPUT_SYNC_ON_STARTUP\`" \
          >> "$GITHUB_STEP_SUMMARY"
        echo "- Fetch interval: \`$INPUT_FETCH_EVERY\`" \
          >> "$GITHUB_STEP_SUMMARY"
        echo "- Caching enabled: \`$INPUT_ENABLE_CACHE\`" \
          >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        # Parse instance count
        INSTANCE_COUNT=$(printf '%s' "$INPUT_GERRIT_SETUP" | jq '. | length')
        echo "INSTANCE_COUNT=$INSTANCE_COUNT" >> "$GITHUB_ENV"
        echo "**Instances to start:** $INSTANCE_COUNT" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

    # Docker Buildx with caching support
    - name: 'Docker Buildx'
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        version: latest
        driver-opts: |
          image=moby/buildkit:latest
          network=host

    # Cache Docker layers for faster builds
    - name: 'Cache Docker layers'
      if: inputs.enable_cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/.buildx-cache
        key: gerrit-docker-${{ runner.os }}-${{ inputs.gerrit_version }}${{ inputs.cache_key_suffix }}
        restore-keys: |
          gerrit-docker-${{ runner.os }}-${{ inputs.gerrit_version }}
          gerrit-docker-${{ runner.os }}-
          gerrit-docker-

    # Cache plugin downloads
    - name: 'Cache plugin downloads'
      if: inputs.enable_cache == 'true' && inputs.skip_plugin_install != 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /tmp/gerrit-plugins
        key: gerrit-plugins-${{ inputs.plugin_version }}${{ inputs.cache_key_suffix }}
        restore-keys: |
          gerrit-plugins-${{ inputs.plugin_version }}
          gerrit-plugins-

    # Build custom Gerrit Docker image with uv and gerrit_to_platform
    - name: 'Build custom Gerrit image'
      if: inputs.enable_cache == 'true'
      shell: bash
      env:
        INPUT_GERRIT_VERSION: ${{ inputs.gerrit_version }}
      run: |
        # Build custom Gerrit image with uv and gerrit_to_platform
        GERRIT_VERSION="$INPUT_GERRIT_VERSION"
        CUSTOM_IMAGE="gerrit-extended:${GERRIT_VERSION}"

        echo "Building custom Gerrit image..."
        echo "  Base: gerritcodereview/gerrit:${GERRIT_VERSION}"
        echo "  Target: ${CUSTOM_IMAGE}"

        if docker buildx build \
          --build-arg "GERRIT_VERSION=${GERRIT_VERSION}" \
          --cache-from type=local,src=/tmp/.buildx-cache \
          --cache-to type=local,dest=/tmp/.buildx-cache,mode=max \
          -t "${CUSTOM_IMAGE}" \
          -f "${{ github.action_path }}/Dockerfile" \
          --load \
          "${{ github.action_path }}"; then
          echo "Custom image built successfully ✅"

          # Verify components (use --entrypoint="" to prevent Gerrit from starting)
          echo "Verifying custom image components..."
          if docker run --rm --entrypoint="" "${CUSTOM_IMAGE}" uv --version 2>/dev/null; then
            echo "  uv: ✅"
          else
            echo "  uv: ⚠️ not found"
          fi
          if docker run --rm --entrypoint="" "${CUSTOM_IMAGE}" which change-merged 2>/dev/null; then
            echo "  gerrit-to-platform: ✅"
          else
            echo "  gerrit-to-platform: ⚠️ not found"
          fi
        else
          echo "::warning::Failed to build custom image, will fall back to official image"
          docker pull "gerritcodereview/gerrit:${GERRIT_VERSION}" || {
            echo "Warning: Failed to pre-pull fallback image"
          }
        fi

    # Detect Gerrit API paths
    - name: 'Detect Gerrit API paths'
      id: detect-api-paths
      shell: bash
      env:
        GERRIT_SETUP: ${{ inputs.gerrit_setup }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Detect Gerrit API paths via redirect detection (Python)
        python3 "${{ github.action_path }}/scripts/detect-api-paths.py"

    # Start Gerrit instances
    - name: 'Start Gerrit instances'
      id: start-instances
      shell: bash
      env:
        GERRIT_SETUP: ${{ inputs.gerrit_setup }}
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        SSH_KNOWN_HOSTS: ${{ inputs.ssh_known_hosts }}
        HTTP_USERNAME: ${{ inputs.http_username }}
        HTTP_PASSWORD: ${{ inputs.http_password }}
        BEARER_TOKEN: ${{ inputs.bearer_token }}
        AUTH_TYPE: ${{ inputs.auth_type }}
        REMOTE_SSH_USER: ${{ inputs.remote_ssh_user }}
        REMOTE_SSH_PORT: ${{ inputs.remote_ssh_port }}
        GERRIT_VERSION: ${{ inputs.gerrit_version }}
        PLUGIN_VERSION: ${{ inputs.plugin_version }}
        BASE_HTTP_PORT: ${{ inputs.base_http_port }}
        BASE_SSH_PORT: ${{ inputs.base_ssh_port }}
        SYNC_REFS: ${{ inputs.sync_refs }}
        REPLICATION_THREADS: ${{ inputs.replication_threads }}
        SYNC_ON_STARTUP: ${{ inputs.sync_on_startup }}
        FETCH_EVERY: ${{ inputs.fetch_every }}
        REPLICATION_TIMEOUT: ${{ inputs.replication_timeout }}
        SKIP_PLUGIN_INSTALL: ${{ inputs.skip_plugin_install }}
        ADDITIONAL_PLUGINS: ${{ inputs.additional_plugins }}
        GERRIT_INIT_ARGS: ${{ inputs.gerrit_init_args }}
        DEBUG: ${{ inputs.debug }}
        USE_API_PATH: ${{ inputs.use_api_path }}
        TUNNEL_HOST: ${{ inputs.tunnel_host }}
        TUNNEL_PORTS: ${{ inputs.tunnel_ports }}
        MAX_PROJECTS: ${{ inputs.max_projects }}
        SKIP_ARCHIVED_PROJECTS: ${{ inputs.skip_archived_projects }}
        REPLICATE_META_REFS: ${{ inputs.replicate_meta_refs }}
        REINDEX_AFTER_SYNC: ${{ inputs.reindex_after_sync }}
      run: |
        # Start Gerrit instances (Python)
        python3 "${{ github.action_path }}/scripts/start-instances.py"

    # Check service availability
    - name: "Check Gerrit service availability"
      if: inputs.check_service == 'true'
      shell: bash
      env:
        SKIP_PLUGIN_INSTALL: ${{ inputs.skip_plugin_install }}
        USE_API_PATH: ${{ inputs.use_api_path }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Check Gerrit service availability (Python)
        python3 "${{ github.action_path }}/scripts/check-services.py"

    # Add SSH authentication keys for user access
    - name: "Add SSH authentication keys"
      if: inputs.ssh_auth_keys != ''
      shell: bash
      env:
        SSH_AUTH_KEYS: ${{ inputs.ssh_auth_keys }}
        SSH_AUTH_USERNAME: ${{ inputs.ssh_auth_username }}
        USE_API_PATH: ${{ inputs.use_api_path }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Add SSH authentication keys for user access (Python)
        python3 "${{ github.action_path }}/scripts/setup-gerrit-user.py" \
          --instances-file "$WORK_DIR/instances.json" \
          --loop-instances

    # Trigger initial replication
    - name: "Trigger initial replication"
      if: inputs.sync_on_startup == 'true'
      shell: bash
      env:
        SKIP_PLUGIN_INSTALL: ${{ inputs.skip_plugin_install }}
        AUTH_TYPE: ${{ inputs.auth_type }}
        SYNC_ON_STARTUP: ${{ inputs.sync_on_startup }}
        REQUIRE_REPLICATION_SUCCESS: ${{ inputs.require_replication_success }}
        REPLICATION_WAIT_TIMEOUT: ${{ inputs.replication_wait_timeout }}
        FETCH_EVERY: ${{ inputs.fetch_every }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Trigger initial replication (Python)
        python3 "${{ github.action_path }}/scripts/trigger-replication.py"

    # Verify replication success
    - name: "Verify replication success"
      if: inputs.sync_on_startup == 'true' && inputs.require_replication_success == 'true'
      shell: bash
      env:
        REPLICATION_WAIT_TIMEOUT: ${{ inputs.replication_wait_timeout }}
        FETCH_EVERY: ${{ inputs.fetch_every }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Verify replication success (Python)
        python3 "${{ github.action_path }}/scripts/verify-replication.py"

    # Reindex changes and flush stale caches after replication.
    # Required when replicate_meta_refs is enabled so the Gerrit UI
    # actually shows the replicated open changes; harmless no-op when
    # the flag is left at its default.
    - name: "Reindex changes and flush caches"
      if: inputs.sync_on_startup == 'true' && inputs.reindex_after_sync == 'true'
      shell: bash
      env:
        REINDEX_AFTER_SYNC: ${{ inputs.reindex_after_sync }}
        SYNC_ON_STARTUP: ${{ inputs.sync_on_startup }}
        USE_API_PATH: ${{ inputs.use_api_path }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Reindex Gerrit changes and flush caches (Python)
        python3 "${{ github.action_path }}/scripts/reindex.py"

    # Set default G2P outputs when disabled
    - name: "Set G2P defaults (disabled)"
      if: inputs.g2p_enable != 'true'
      id: g2p-defaults
      shell: bash
      run: |
        # G2P is disabled — write safe defaults
        echo "g2p_enabled=false" >> "$GITHUB_OUTPUT"
        echo "g2p_config_path=" >> "$GITHUB_OUTPUT"
        echo "g2p_hooks_enabled=[]" >> "$GITHUB_OUTPUT"
        echo "g2p_github_owner=" >> "$GITHUB_OUTPUT"
        echo "g2p_remote_name_style=" >> "$GITHUB_OUTPUT"
        echo "g2p_validation_results=[]" >> "$GITHUB_OUTPUT"
        echo "g2p_token_provided=false" >> "$GITHUB_OUTPUT"
        echo "g2p_ssh_public_key=" >> "$GITHUB_OUTPUT"
        echo "g2p_org_audit_results=[]" >> "$GITHUB_OUTPUT"
        echo "g2p_org_provisioned=false" >> "$GITHUB_OUTPUT"

    # Install PyNaCl on the runner when we will auto-provision
    # org-level secrets.  PyNaCl is required for sealed-box
    # encryption of GitHub Actions secrets; install only when
    # actually needed.  A plain user-level pip install keeps
    # this step self-contained: no setup-uv dependency and no
    # interaction with the runner's PEP 668 system Python.
    - name: "Install PyNaCl (provision mode)"
      if: >-
        inputs.g2p_enable == 'true' &&
        inputs.g2p_org_setup == 'provision'
      shell: bash
      run: |
        # Install PyNaCl for org secret provisioning
        set -euo pipefail
        echo "Installing PyNaCl (user site)…"
        python3 -m pip install --user --upgrade PyNaCl
        python3 -c "import nacl.public; print('PyNaCl OK')"

    # Configure G2P (gerrit_to_platform)
    - name: "Configure G2P integration"
      if: inputs.g2p_enable == 'true'
      id: configure-g2p
      shell: bash
      env:
        G2P_ENABLE: ${{ inputs.g2p_enable }}
        G2P_GITHUB_TOKEN: ${{ inputs.g2p_github_token }}
        G2P_GITHUB_OWNER: ${{ inputs.g2p_github_owner }}
        G2P_REMOTE_NAME_STYLE: ${{ inputs.g2p_remote_name_style }}
        G2P_REMOTE_URL: ${{ inputs.g2p_remote_url }}
        G2P_REMOTE_AUTH_GROUP: ${{ inputs.g2p_remote_auth_group }}
        G2P_COMMENT_MAPPINGS: ${{ inputs.g2p_comment_mappings }}
        G2P_HOOKS: ${{ inputs.g2p_hooks }}
        G2P_VALIDATION_MODE: ${{ inputs.g2p_validation_mode }}
        G2P_VALIDATE_WORKFLOWS: ${{ inputs.g2p_validate_workflows }}
        G2P_VALIDATE_REPOS: ${{ inputs.g2p_validate_repos }}
        G2P_SSH_PRIVATE_KEY: ${{ inputs.g2p_ssh_private_key }}
        G2P_GITHUB_KNOWN_HOSTS: ${{ inputs.g2p_github_known_hosts }}
        G2P_ORG_SETUP: ${{ inputs.g2p_org_setup }}
        G2P_ORG_TOKEN_MAP: ${{ inputs.g2p_org_token_map }}
        DEBUG: ${{ inputs.debug }}
        USE_API_PATH: ${{ inputs.use_api_path }}
        TUNNEL_HOST: ${{ inputs.tunnel_host }}
        TUNNEL_PORTS: ${{ inputs.tunnel_ports }}
        SSH_AUTH_USERNAME: ${{ inputs.ssh_auth_username }}
      run: |
        # Configure gerrit_to_platform inside containers (Python)
        python3 "${{ github.action_path }}/scripts/configure-g2p.py"

    # Collect outputs
    - name: "Collect outputs"
      id: collect-outputs
      shell: bash
      env:
        DEBUG: ${{ inputs.debug }}
      run: |
        # Collect outputs (Python)
        python3 "${{ github.action_path }}/scripts/collect-outputs.py"

    # Terminate containers when finished
    - name: "Terminate containers when finished"
      if: inputs.exit == 'true'
      shell: bash
      env:
        ENABLE_CACHE: ${{ inputs.enable_cache }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Terminate containers when finished (Python)
        python3 "${{ github.action_path }}/scripts/cleanup.py"

    # Container persistence message
    - name: "Containers will continue/persist"
      if: inputs.exit != 'true'
      shell: bash
      run: |
        # Containers will continue/persist (Python)
        python3 - <<'PY'
        import json, os, pathlib, sys

        summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
        instances_path = (
            pathlib.Path(os.environ.get('WORK_DIR', ''))
            / 'instances.json'
        )

        cids: list[str] = []
        if instances_path.is_file():
            data = json.loads(instances_path.read_text())
            for slug in sorted(data):
                cid = data[slug].get('cid', '')
                if cid:
                    cids.append(cid)

        # Always print a human-readable status to stdout so the
        # step is never silent in the Actions console.
        print('🐳 Containers have detached and will continue/persist')
        if cids:
            print('To manually clean up later, run:')
            for cid in cids:
                print(f'  docker kill {cid}')
        else:
            print('(no container IDs were recorded)')
        sys.stdout.flush()

        if summary:
            lines = [
                '**Containers Status** 🐳',
                '',
                'Containers have detached and will continue/persist',
                '',
            ]
            if cids:
                lines.extend([
                    'To manually cleanup later, run:',
                    '```bash',
                ])
                for cid in cids:
                    lines.append(f'docker kill {cid}')
                lines.extend(['```', ''])
            with open(summary, 'a') as fh:
                fh.write('\n'.join(lines) + '\n')
        PY
